<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoneyLuxeCloverCo</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fff6f9;
  color: #5a3e45;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: white;
  position: sticky;
  top: 0;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: #e89cab;
}

button {
  background: #f7a8b8;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: #ffeaf0;
}

.hero h1 {
  font-size: 36px;
}

.hero p {
  font-style: italic;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  background: white;
  width: 300px;
  height: 100%;
  padding: 20px;
  display: none;
  overflow: auto;
}
</style>
</head>

<body>

<nav>
  <div class="logo">HoneyLuxeCloverCo 🎀</div>
  <button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</nav>

<section class="hero">
  <h1>Soft luxury for gentle hearts 💗</h1>
  <p>“Soft luxury made to be felt, not just seen.”</p>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Bow Phone Case</h3>
<p>$16.99</p>
<button onclick="addToCart('Bow Phone Case',16.99)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Pink Tote Bag</h3>
<p>$24.99</p>
<button onclick="addToCart('Pink Tote Bag',24.99)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Bow Necklace</h3>
<p>$14.99</p>
<button onclick="addToCart('Bow Necklace',14.99)">Add to Cart</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart 💗</h2>
<ul id="cartItems"></ul>
<p>Total: $<span id="total">0</span></p>

<button onclick="payCashApp()">Pay with Cash App</button>
<br><br>
<button onclick="sendOrder()">Place Order (Email)</button>
<br><br>
<button onclick="toggleCart()">Close</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cartItems");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.name + " - $" + item.price;
    list.appendChild(li);
    total += item.price;
  });

  document.getElementById("total").textContent = total;
  document.getElementById("count").textContent = cart.length;
}

function toggleCart() {
  let cartBox = document.getElementById("cart");
  cartBox.style.display = cartBox.style.display === "block" ? "none" : "block";
}

function payCashApp() {
  window.location.href = "https://cash.app/$Jaeleeyahcodie13";
}

function sendOrder() {
  let body = "Order:\n";
  cart.forEach(item => {
    body += item.name + " - $" + item.price + "%0D%0A";
  });

  window.location.href =
  "mailto:Jaeleeyahcodie1@gmail.com?subject=New Order&body=" + body;
}
</script>

</body>
</html>
