<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoneyLuxeCloverCo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#fff0f5;
  overflow-x:hidden;
}

/* FLOATING BOWS */
.bow {
  position:fixed;
  width:40px;
  animation:float 8s infinite linear;
}

@keyframes float {
  0% { transform:translateY(100vh); }
  100% { transform:translateY(-10vh); }
}

/* HEADER */
header {
  padding:20px;
  text-align:center;
  font-size:26px;
  color:#ff69b4;
  font-weight:bold;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
}

.hero h1 {
  font-size:36px;
}

/* BUTTON */
button {
  background:linear-gradient(135deg,#ffb6c1,#ff69b4);
  border:none;
  padding:10px 20px;
  border-radius:25px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:30px;
}

.card {
  background:white;
  border-radius:20px;
  padding:15px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:15px;
}

/* CART */
.cart {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:20px;
  display:none;
  overflow:auto;
}
</style>
</head>

<body>

<!-- FLOATING BOWS -->
<img class="bow" style="left:10%" src="https://i.imgur.com/OdL0XPt.png">
<img class="bow" style="left:40%" src="https://i.imgur.com/OdL0XPt.png">
<img class="bow" style="left:70%" src="https://i.imgur.com/OdL0XPt.png">

<header>HoneyLuxeCloverCo 🎀</header>

<div class="hero">
  <h1>Soft luxury for gentle souls</h1>
  <button onclick="scrollToShop()">Browse 💕</button>
  <button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</div>

<!-- PRODUCTS -->
<div id="shop" class="products">

<div class="card">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<p>Wallpaper Pack</p>
<p>$5</p>
<button onclick="addToCart('Wallpaper Pack',5)">Add</button>
</div>

<div class="card">
<img src="https://i.imgur.com/2nCt3Sbl.jpg">
<p>Poem Download</p>
<p>$3</p>
<button onclick="addToCart('Poem',3)">Add</button>
</div>

<div class="card">
<img src="https://i.imgur.com/DvpvklR.png">
<p>Phone Case</p>
<p>$15</p>
<button onclick="addToCart('Phone Case',15)">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart 💖</h2>
<ul id="items"></ul>
<p>Total: $<span id="total">0</span></p>

<button onclick="payCashApp()">Pay CashApp</button>
<br><br>
<button onclick="emailOrder()">Email Order</button>
<br><br>
<button onclick="toggleCart()">Close</button>
</div>

<script>
let cart=[];

function addToCart(name,price){
  cart.push({name,price});
  updateCart();
}

function updateCart(){
  let list=document.getElementById("items");
  let total=0;
  list.innerHTML="";

  cart.forEach(item=>{
    let li=document.createElement("li");
    li.textContent=item.name+" - $"+item.price;
    list.appendChild(li);
    total+=item.price;
  });

  document.getElementById("total").textContent=total;
  document.getElementById("count").textContent=cart.length;
}

function toggleCart(){
  let c=document.getElementById("cart");
  c.style.display=c.style.display==="block"?"none":"block";
}

function payCashApp(){
  window.location.href="https://cash.app/$Jaeleeyahcodie13";
}

function emailOrder(){
  let body="Order:%0D%0A";
  cart.forEach(item=>{
    body+=item.name+" - $"+item.price+"%0D%0A";
  });

  window.location.href="mailto:Jaeleeyahcodie1@gmail.com?subject=Order&body="+body;
}

function scrollToShop(){
  document.getElementById("shop").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
