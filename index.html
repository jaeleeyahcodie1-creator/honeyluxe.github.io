<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoneyLuxeCloverCo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#fff5f7;
  color:#5a3e3e;
}

/* HEADER */
header {
  background:white;
  padding:15px;
  text-align:center;
  border-bottom:1px solid #ffd6df;
}
.logo {
  font-family:'Playfair Display', serif;
  font-size:28px;
  color:#ff8fb1;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
  background:linear-gradient(#ffe6ec, #fff);
}
.hero h1 {
  font-family:'Playfair Display', serif;
  font-size:36px;
}
.hero p {
  color:#a36b7c;
}
.btn {
  background:#ff8fb1;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin-top:15px;
}

/* SECTIONS */
.section {
  padding:40px 20px;
  text-align:center;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:15px;
}

/* CARDS */
.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
.card img {
  width:100%;
  border-radius:10px;
}
.price {
  color:#ff6f9c;
  font-weight:bold;
}

/* QUOTE BUBBLE */
.quote {
  background:#ffe3ec;
  padding:20px;
  border-radius:20px;
  margin:20px;
  font-style:italic;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  background:#fff;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <div class="logo">HoneyLuxeCloverCo</div>
</header>

<section class="hero">
  <h1>Soft art & words</h1>
  <p>for gentle souls</p>
  <button class="btn">Browse Collection</button>
</section>

<!-- COLLECTION -->
<section class="section">
  <h2>Shop by Collection</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Wallpapers</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Poems</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Phone Cases</p>
    </div>

  </div>
</section>

<!-- PRODUCTS -->
<section class="section">
  <h2>Featured Products</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Bear Phone Case</p>
      <div class="price">$16.99</div>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Pink Bow Bag</p>
      <div class="price">$24.99</div>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Bow Necklace</p>
      <div class="price">$14.99</div>
      <button class="btn">Add to Cart</button>
    </div>

  </div>
</section>

<!-- QUOTE -->
<div class="quote">
  "You deserve soft things, gentle moments, and a heart at peace."
</div>

<footer>
  <p>© HoneyLuxeCloverCo</p>
</footer>

</body>
</html>
